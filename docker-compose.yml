# =============================================================================
# Mikrotik Monitor — docker-compose.yml
# Projeto: Mikrotik Monitor
# Descrição: Orquestração dos containers do sistema de monitoramento dedicado
#            ao roteador Mikrotik RB2011UiAS-2HnD (10.0.0.1).
# Servidor: 10.0.0.5 (Ubuntu ARM64) em /opt/mikrotik-monitor
# Serviços: backend (Node.js/Express), frontend (React/Vite via Nginx),
#           banco SQLite via volume persistente.
# Autor: Gerado para Sítio Pé de Serra
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # Backend — API REST + Coletor SNMP
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mikrotik-monitor-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # Mikrotik alvo
      MIKROTIK_HOST: "10.0.0.1"
      SNMP_COMMUNITY: "public"
      SNMP_VERSION: "2c"
      # Coleta a cada 5 minutos (em ms)
      COLLECT_INTERVAL_MS: 300000
      # SQLite — caminho dentro do container
      DB_PATH: "/app/data/mikrotik.db"
    volumes:
      # Dados persistentes do SQLite
      - mikrotik_data:/app/data
    networks:
      - mikrotik_net
    # O backend NÃO expõe porta para o host diretamente; o frontend (Nginx)
    # faz proxy_pass para ele. Caso queira debug direto, descomente:
    # ports:
    #   - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Frontend — React/Vite servido via Nginx + proxy reverso para API
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL da API vista pelo navegador (passa pelo Nginx interno)
        VITE_API_BASE_URL: "/api"
    container_name: mikrotik-monitor-frontend
    restart: unless-stopped
    ports:
      - "3040:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mikrotik_net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  mikrotik_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/nodejs/mikrotik-monitor/data

# =============================================================================
# Redes
# =============================================================================
networks:
  mikrotik_net:
    driver: bridge
